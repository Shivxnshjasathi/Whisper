<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#08010f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Whisper" />
    
    <!-- SEO -->
    <meta name="description" content="Whisper — A private shared journal for two. Your intimate digital space, together." />
    <title>Whisper</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />
    
    <!-- Splash screen color -->
    <meta name="msapplication-TileColor" content="#08010f" />
  </head>
  <body class="bg-[#08010f] text-white antialiased">
    <div id="root">
      <!-- Native-like App Splash Screen -->
      <style>
        #app-splash {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background: radial-gradient(circle at top right, #1f0d2c 0%, #08010f 60%);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 99999;
        }
        .splash-logo {
          font-family: 'Playfair Display', serif;
          font-size: 48px;
          font-weight: 600;
          background: linear-gradient(to right, #ffffff, rgba(255, 255, 255, 0.6));
          -webkit-background-clip: text;
          color: transparent;
          margin-bottom: 30px;
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .splash-spinner {
          width: 32px;
          height: 32px;
          border: 3px solid rgba(255, 255, 255, 0.05);
          border-top-color: #fb7185;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.8; transform: scale(0.97); }
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div id="app-splash">
        <h1 class="splash-logo">Whisper</h1>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
