<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f0520 0%, #1a0a2e 50%, #150826 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.875rem;
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(to right, #ec4899, #f472b6);
      color: white;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💜</div>
    <h1>You're offline</h1>
    <p>Don't worry — your whispers are safe. They'll sync when you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
